services:
    db:
        image: postgres:15
        command:
            - "postgres"
            - "-c"
            - "shared_buffers=384MB"
            - "-c"
            - "effective_cache_size=1GB"
            - "-c"
            - "work_mem=8MB"
            - "-c"
            - "maintenance_work_mem=96MB"
        shm_size: "256mb"
        mem_limit: "2560m"
        mem_reservation: "1g"
        environment:
            POSTGRES_USER: ${DB_USER:-deepbounty}
            POSTGRES_PASSWORD: ${DB_PASSWORD:-deepbounty}
            POSTGRES_DB: ${DB_NAME:-deepbounty}
        volumes:
            - db-data:/var/lib/postgresql/data
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U ${DB_USER:-deepbounty} -d ${DB_NAME:-deepbounty}",
                ]
            interval: 5s
            timeout: 3s
            retries: 10
        restart: unless-stopped

    server:
        build:
            context: .
            dockerfile: server/Dockerfile
        environment:
            NODE_ENV: production
            DB_HOST: db
            DB_PORT: 5432
            DB_USER: ${DB_USER:-deepbounty}
            DB_PASSWORD: ${DB_PASSWORD:-deepbounty}
            DB_NAME: ${DB_NAME:-deepbounty}
            EXTERNAL_URL: ${EXTERNAL_URL:-http://localhost}
            WORKER_KEY: ${WORKER_KEY}
            NODE_OPTIONS: ${NODE_OPTIONS:---max-old-space-size=2048}
        ports:
            # DNS callbacks
            - "0.0.0.0:53:5300/udp"
        depends_on:
            db:
                condition: service_healthy
        volumes:
            - deepbounty-server-config:/app/server/config
            - deepbounty-server-modules:/app/server/modules
            - deepbounty-server-logs:/app/server/logs
        mem_limit: "3g"
        mem_reservation: "1g"
        restart: unless-stopped

    webapp:
        build:
            context: .
            dockerfile: webapp/Dockerfile
            args:
                VITE_API_URL: /api
        environment:
            DEEPBOUNTY_ACCESS_MODE: ${DEEPBOUNTY_ACCESS_MODE:-public}
            DEEPBOUNTY_BEHIND_PROXY: ${DEEPBOUNTY_BEHIND_PROXY:-false}
            DEEPBOUNTY_TRUSTED_PROXY_CIDRS: ${DEEPBOUNTY_TRUSTED_PROXY_CIDRS:-}
        ports:
            - "${WEBAPP_PORT:-8080}:80"
        depends_on:
            - server
        mem_limit: "256m"
        restart: unless-stopped

volumes:
    db-data:
    deepbounty-server-config:
    deepbounty-server-modules:
    deepbounty-server-logs:
